name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore LMS.sln

      - name: Build
        run: dotnet build LMS.sln --configuration Release --no-restore

      # Tests are TODO. When `LMS.Tests` exists, uncomment:
      # - name: Test
      #   run: dotnet test LMS.sln --configuration Release --no-build --logger trx
