name: Deploy

# Builds a Docker image, pushes it to GitHub Container Registry, then SSHes to
# the Hetzner server and rolls the stack to the new image.
#
# Required repository secrets:
#   SSH_HOST   - server IP / hostname
#   SSH_USER   - ssh user (e.g. deploy)
#   SSH_KEY    - private key whose public half is in the server's authorized_keys
# Optional:
#   SSH_PORT   - ssh port (defaults to 22)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR image paths must be lowercase.
      - name: Compute image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the server's compose + Caddy config in sync with the repo.
      - name: Sync compose + Caddyfile to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml,Caddyfile"
          target: /opt/eduvibe

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_REF
          script: |
            set -euo pipefail
            cd /opt/eduvibe
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            # Pin the api image to this commit's sha for an immutable deploy.
            export IMAGE="$IMAGE_REF"
            docker compose pull api
            # Touch only the backend + edge services; never clobber the web
            # container, which the frontend repo's pipeline owns.
            docker compose up -d db redis api caddy
            # Apply any Caddyfile changes synced above (no-op if unchanged).
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
