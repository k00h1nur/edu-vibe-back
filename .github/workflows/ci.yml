name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # A real Postgres service for the migrations-script verification step.
    # We don't run real tests against it yet, but the migrations script can
    # be applied to a clean DB to verify it executes cleanly.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore LMS.sln

      - name: Build (Release, warnings as errors)
        run: dotnet build LMS.sln --configuration Release --no-restore -warnaserror

      # Catches uncommitted EF model changes — a Domain entity touched without
      # a paired migration would produce a non-empty script with NEW table /
      # column / index entries.
      - name: Verify EF migrations script generates
        run: |
          dotnet tool install -g dotnet-ef --version 8.*
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef migrations script --idempotent \
            --project LMS.Infrastructure --startup-project LMS.WebApi \
            --output /tmp/migrations.sql --no-build --configuration Release
          test -s /tmp/migrations.sql

      # Tests are scaffolded but the project doesn't exist yet. When LMS.Tests
      # lands, uncomment:
      # - name: Test
      #   run: dotnet test LMS.sln --configuration Release --no-build --logger trx --collect:"XPlat Code Coverage"
