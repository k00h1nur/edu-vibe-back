# Production stack for the EduVibe LMS API.
#
# Values come from a .env file living next to this file on the server
# (see .env.example). The CI/CD pipeline overrides IMAGE with a sha-pinned tag
# at deploy time; locally `latest` is used.
#
# Bring up:   docker compose up -d
# Logs:       docker compose logs -f api
# Restart:    docker compose up -d --force-recreate api

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Exposed on loopback only so you can psql from the host; not reachable
    # from the public internet. Drop this block to keep it fully internal.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${IMAGE:-ghcr.io/k00h1nur/edu-vibe-back:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Single source of truth: build the connection string from the POSTGRES_* vars.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379"
      # Apply pending EF migrations on boot (single-instance deploy).
      Database__AutoMigrateOnStartup: "true"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-EduVibe}
      Jwt__Audience: ${JWT_AUDIENCE:-EduVibeClients}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__ChatId: ${TELEGRAM_CHAT_ID}
      # Production refuses to boot with an empty CORS origin list. The frontend
      # (edu-vibe.uz) calls the API cross-origin once it points at api.edu-vibe.uz.
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_1:-https://www.edu-vibe.uz}
      Cors__AllowedOrigins__2: ${CORS_ORIGIN_2:-https://admin.edu-vibe.uz}
      DemoUsers__Enabled: ${DEMO_USERS_ENABLED:-false}
      DemoUsers__Password: ${DEMO_USERS_PASSWORD:-Demo!2026}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Front door: nginx image built from the Edu-Vibe frontend repo. It serves
  # the React SPA AND reverse-proxies /api, /uploads, /health to the api
  # container — so browser traffic is single-origin (no CORS). Built and pushed
  # by the frontend repo's own CI; this stack just runs the published image.
  # No depends_on api: nginx resolves the backend at request time (resolver in
  # nginx.conf), so web and api can be deployed independently and in any order.
  web:
    image: ${WEB_IMAGE:-ghcr.io/k00h1nur/edu-vibe:latest}
    restart: unless-stopped
    # Internal only — Caddy is the public front door now.
    expose:
      - "80"

  # Next.js admin/teacher/student panel (repo: LastChange), served at
  # admin.edu-vibe.uz. Runs the standalone `next start` server. API calls are
  # server-side using the session cookie that is first-party to this origin, so
  # NEXT_PUBLIC_API_BASE_URL points at the public API. Owned by the LastChange
  # pipeline (it runs `up -d admin`); not in Caddy's depends_on.
  admin:
    image: ${ADMIN_IMAGE:-ghcr.io/k00h1nur/lastchange:latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # Used by next.config rewrites() at runtime (e.g. /uploads -> API).
      NEXT_PUBLIC_API_BASE_URL: ${ADMIN_API_BASE_URL:-https://api.edu-vibe.uz}

  # TLS edge: terminates HTTPS (automatic Let's Encrypt) for edu-vibe.uz,
  # www.edu-vibe.uz and api.edu-vibe.uz, and reverse-proxies to web / api.
  # No depends_on: Caddy re-resolves web/api via Docker DNS at dial time, so it
  # must NOT list them as dependencies — otherwise a backend `up -d ... caddy`
  # would pull web in and recreate it from .env's (possibly stale) WEB_IMAGE,
  # clobbering whatever the frontend pipeline deployed.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  uploads:
  caddy_data:
  caddy_config:
