# Production stack for the EduVibe LMS API.
#
# Values come from a .env file living next to this file on the server
# (see .env.example). The CI/CD pipeline overrides IMAGE with a sha-pinned tag
# at deploy time; locally `latest` is used.
#
# Bring up:   docker compose up -d
# Logs:       docker compose logs -f api
# Restart:    docker compose up -d --force-recreate api

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Exposed on loopback only so you can psql from the host; not reachable
    # from the public internet. Drop this block to keep it fully internal.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${IMAGE:-ghcr.io/k00h1nur/edu-vibe-back:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Single source of truth: build the connection string from the POSTGRES_* vars.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379"
      # Apply pending EF migrations on boot (single-instance deploy).
      Database__AutoMigrateOnStartup: "true"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-EduVibe}
      Jwt__Audience: ${JWT_AUDIENCE:-EduVibeClients}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__ChatId: ${TELEGRAM_CHAT_ID}
      # Production refuses to boot with an empty CORS origin list.
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0}
      DemoUsers__Enabled: ${DEMO_USERS_ENABLED:-false}
      DemoUsers__Password: ${DEMO_USERS_PASSWORD:-Demo!2026}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Front door: nginx image built from the Edu-Vibe frontend repo. It serves
  # the React SPA AND reverse-proxies /api, /uploads, /health to the api
  # container — so browser traffic is single-origin (no CORS). Built and pushed
  # by the frontend repo's own CI; this stack just runs the published image.
  # No depends_on api: nginx resolves the backend at request time (resolver in
  # nginx.conf), so web and api can be deployed independently and in any order.
  web:
    image: ${WEB_IMAGE:-ghcr.io/k00h1nur/edu-vibe:latest}
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # uncomment once a domain + TLS are configured

volumes:
  pgdata:
  redisdata:
  uploads:
